services:
  neo4j:
    image: neo4j:5.26.27   # pinned (5.26 LTS); `docker pull neo4j:5.26.27` ahead of the workshop
    container_name: workshop-neo4j
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/workshop123
    volumes: ["neo4j_data:/data"]
volumes:
  neo4j_data: {}
